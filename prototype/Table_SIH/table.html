<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Section</title>
  <link rel="stylesheet" href="table.css">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(ColumnChart);
    google.charts.setOnLoadCallback(PieChart);
    google.charts.setOnLoadCallback(LineChart);

    function ColumnChart() {
      // Set Data
      const data = google.visualization.arrayToDataTable([
        ['Diease', 'victim'],
        ['Eye flu', 57], ['Dengu', 10], ['Malaria', 32], ['Chickenpox', 17], ['Polio', 5]
      ]);

      // Set Options
      const options = {
        // title: 'Daily Analysis',
        hAxis: { title: 'Diseases' },
        vAxis: { title: 'No. of Victims' },
        legend:'hello',
        backgroundColor: '#d0d0d0',
        borderRadius:'10px'
      };
      // Draw Chart
      const chart = new google.visualization.ColumnChart(document.getElementById('columnChart'));
      chart.draw(data, options);
    }
    function PieChart() {

      const data = google.visualization.arrayToDataTable([
        ['Diease', 'victim'],
        ['Eye flu', 57], ['Dengu', 10], ['Malaria', 32], ['Chickenpox', 17], ['Polio', 5]
      ]);

      const options = {
        backgroundColor: '#d0d0d0',
        is3D: true
      };

      const chart = new google.visualization.PieChart(document.getElementById('PieChart'));
      chart.draw(data, options);

    }
    function LineChart() {
      const data = google.visualization.arrayToDataTable([
        ['Month', 'Eye Flu', 'Dengu', 'Malaria','chickenpox','polio'],
        ['Jan', 1000, 400, 600,890,507],
        ['Feb', 1170, 460, 710,674,364],
        ['Mar', 660, 1120, 400,478,290],
        ['Apr', 1030, 540, 490,489,267]
      ]);

      const options = {
        // title: 'Company Performance',
        backgroundColor: '#d0d0d0',
        curveType: 'function',
        legend: { position: 'bottom' },
        colors: ['#4285F4', '#34A853', '#FBBC05', '#EA4335', '#FF7F50'], // Line colors
        trendlines: { 0: { color: 'black' } }
      };

      const chart = new google.visualization.LineChart(document.getElementById('LineChart'));
      chart.draw(data, options);
    }
  </script>
</head>
